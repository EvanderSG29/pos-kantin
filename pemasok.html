<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Pemasok | POS Kantin</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <link href="./assets/vendor/sb-admin-2/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
    <link href="./assets/vendor/sb-admin-2/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="./assets/css/sb-admin-custom.css" rel="stylesheet">
  </head>
  <body class="pos-shell-page">
    <div id="app-shell">
      <aside id="app-sidebar"></aside>

      <div class="pos-shell-body">
        <header id="app-topbar"></header>

        <main id="app-main" class="pos-main" aria-live="polite" aria-busy="false">
          <div id="app-page-slot"></div>
          <div id="app-main-loading" class="pos-main-loading" hidden>
            <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
            <p id="app-main-loading-text" class="mb-0">Memuat konten...</p>
          </div>
        </main>
      </div>
    </div>

    <button id="scroll-to-top" class="scroll-to-top rounded" type="button" hidden aria-label="Kembali ke atas">
      <i class="fas fa-angle-up"></i>
    </button>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <template id="page-template" data-page-key="suppliers" data-page-title="Pemasok">
      <section class="pos-page-view">
        <div class="container-fluid">
          <div class="pos-page-header">
            <div>
              <p class="pos-section-title">Pemasok</p>
              <h1 class="h3 mb-1 text-gray-800">Master pemasok</h1>
              <p class="small text-gray-600 mb-0">Kelola skema komisi, persentase, termin pembayaran, dan status aktif tiap pemasok dari satu panel.</p>
            </div>
          </div>

          <div class="row">
            <div class="col-xl-4 col-lg-5">
              <section class="card shadow mb-4">
                <div class="card-header py-3">
                  <h6 class="m-0 font-weight-bold text-primary">Form pemasok</h6>
                </div>
                <div class="card-body">
                  <form id="supplier-form">
                    <input type="hidden" name="id">

                    <div class="form-group">
                      <label for="supplierName">Nama pemasok</label>
                      <input id="supplierName" name="supplierName" type="text" class="form-control" required>
                    </div>

                    <div class="form-row pos-finance-form-grid">
                      <div class="form-group col-sm-6">
                        <label for="contactName">Kontak</label>
                        <input id="contactName" name="contactName" type="text" class="form-control">
                      </div>
                      <div class="form-group col-sm-6">
                        <label for="contactPhone">Telepon</label>
                        <input id="contactPhone" name="contactPhone" type="text" class="form-control">
                      </div>
                    </div>

                    <div class="form-row pos-finance-form-grid">
                      <div class="form-group col-sm-4">
                        <label for="commissionRate">Potongan (%)</label>
                        <input id="commissionRate" name="commissionRate" type="number" min="0" step="1" class="form-control" required>
                      </div>
                      <div class="form-group col-sm-4">
                        <label for="commissionBaseType">Skema</label>
                        <select id="commissionBaseType" name="commissionBaseType" class="custom-select">
                          <option value="revenue">Bagi Omzet</option>
                          <option value="profit">Bagi Hasil</option>
                        </select>
                      </div>
                      <div class="form-group col-sm-4">
                        <label for="payoutTermDays">Termin (hari)</label>
                        <input id="payoutTermDays" name="payoutTermDays" type="number" min="0" step="1" class="form-control" required>
                      </div>
                    </div>

                    <div class="form-group">
                      <label for="isActive">Status</label>
                      <select id="isActive" name="isActive" class="custom-select">
                        <option value="true">Aktif</option>
                        <option value="false">Nonaktif</option>
                      </select>
                    </div>

                    <div class="form-group">
                      <label for="notes">Catatan</label>
                      <textarea id="notes" name="notes" rows="4" class="form-control"></textarea>
                    </div>

                    <div class="pos-form-actions">
                      <button type="submit" class="btn btn-primary shadow-sm">Simpan pemasok</button>
                      <button type="button" id="supplier-reset" class="btn btn-outline-secondary">Reset</button>
                    </div>
                  </form>
                </div>
              </section>
            </div>

            <div class="col-xl-8 col-lg-7">
              <section class="card shadow mb-4">
                <div class="card-header py-3">
                  <h6 class="m-0 font-weight-bold text-primary">Daftar pemasok</h6>
                </div>
                <div class="card-body" id="suppliers-table"></div>
              </section>
            </div>
          </div>
        </div>

        <footer class="sticky-footer bg-white">
          <div class="container my-auto">
            <div class="copyright text-center my-auto pos-footer-note">
              <span>Master pemasok menjadi sumber tunggal untuk skema komisi dan termin pembayaran transaksi baru.</span>
            </div>
          </div>
        </footer>
      </section>
    </template>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
