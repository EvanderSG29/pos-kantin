<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Pembayaran Pemasok | POS Kantin</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <link href="./assets/vendor/sb-admin-2/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
    <link href="./assets/vendor/sb-admin-2/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="./assets/css/sb-admin-custom.css" rel="stylesheet">
  </head>
  <body class="pos-shell-page">
    <div id="app-shell">
      <aside id="app-sidebar"></aside>

      <div class="pos-shell-body">
        <header id="app-topbar"></header>

        <main id="app-main" class="pos-main" aria-live="polite" aria-busy="false">
          <div id="app-page-slot"></div>
          <div id="app-main-loading" class="pos-main-loading" hidden>
            <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
            <p id="app-main-loading-text" class="mb-0">Memuat konten...</p>
          </div>
        </main>
      </div>
    </div>

    <button id="scroll-to-top" class="scroll-to-top rounded" type="button" hidden aria-label="Kembali ke atas">
      <i class="fas fa-angle-up"></i>
    </button>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <template id="page-template" data-page-key="supplierPayouts" data-page-title="Pembayaran Pemasok">
      <section class="pos-page-view">
        <div class="container-fluid">
          <div class="pos-page-header">
            <div>
              <p class="pos-section-title">Pembayaran</p>
              <h1 class="h3 mb-1 text-gray-800">Pembayaran pemasok</h1>
              <p class="small text-gray-600 mb-0">Kelompokkan saldo terbuka per pemasok dan jatuh tempo, lalu tandai lunas saat pembayaran selesai.</p>
            </div>
          </div>

          <section id="payout-summary" class="pos-summary-grid"></section>

          <section class="card shadow mb-4">
            <div class="card-header py-3">
              <h6 class="m-0 font-weight-bold text-primary">Bucket termin aktif</h6>
            </div>
            <div class="card-body" id="payout-bucket-grid"></div>
          </section>

          <section class="card shadow mb-4">
            <div class="card-header py-3 pos-card-toolbar">
              <h6 class="m-0 font-weight-bold text-primary">Outstanding payout</h6>
              <div class="form-inline">
                <div class="form-group">
                  <label class="sr-only" for="outstanding-filter-status">Status jatuh tempo</label>
                  <select id="outstanding-filter-status" class="custom-select">
                    <option value="">Semua status</option>
                    <option value="overdue">Overdue</option>
                    <option value="today">Hari ini</option>
                    <option value="upcoming">Mendatang</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="sr-only" for="outstanding-filter-search">Cari payout</label>
                  <input id="outstanding-filter-search" type="text" class="form-control" placeholder="Cari pemasok, termin, jatuh tempo">
                </div>
                <button type="button" id="outstanding-filter-reset" class="btn btn-outline-secondary btn-sm">Reset filter</button>
                <a class="btn btn-sm btn-outline-primary" href="./pemasok.html">Kelola pemasok</a>
              </div>
            </div>
            <div class="card-body" id="outstanding-payout-table"></div>
          </section>

          <section class="card shadow mb-4">
            <div class="card-header py-3 pos-card-toolbar">
              <h6 class="m-0 font-weight-bold text-primary">Riwayat payout terbaru</h6>
              <div class="form-inline">
                <div class="form-group">
                  <label class="sr-only" for="history-filter-search">Cari riwayat</label>
                  <input id="history-filter-search" type="text" class="form-control" placeholder="Cari pemasok, admin, catatan">
                </div>
                <button type="button" id="history-filter-reset" class="btn btn-outline-secondary btn-sm">Reset filter</button>
              </div>
            </div>
            <div class="card-body" id="payout-history-table"></div>
          </section>
        </div>

        <footer class="sticky-footer bg-white">
          <div class="container my-auto">
            <div class="copyright text-center my-auto pos-footer-note">
              <span>Payout yang sudah ditandai lunas akan membekukan transaksi terkait agar audit trail tetap aman.</span>
            </div>
          </div>
        </footer>
      </section>
    </template>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
