<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Simpanan | POS Kantin</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <link href="./assets/vendor/sb-admin-2/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
    <link href="./assets/vendor/sb-admin-2/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="./assets/css/sb-admin-custom.css" rel="stylesheet">
  </head>
  <body class="pos-shell-page">
    <div id="app-shell">
      <aside id="app-sidebar"></aside>

      <div class="pos-shell-body">
        <header id="app-topbar"></header>

        <main id="app-main" class="pos-main" aria-live="polite" aria-busy="false">
          <div id="app-page-slot"></div>
          <div id="app-main-loading" class="pos-main-loading" hidden>
            <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
            <p id="app-main-loading-text" class="mb-0">Memuat konten...</p>
          </div>
        </main>
      </div>
    </div>

    <button id="scroll-to-top" class="scroll-to-top rounded" type="button" hidden aria-label="Kembali ke atas">
      <i class="fas fa-angle-up"></i>
    </button>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <template id="page-template" data-page-key="savings" data-page-title="Simpanan">
      <section class="pos-page-view">
        <div class="container-fluid">
          <div class="pos-page-header">
            <div>
              <p class="pos-section-title">Simpanan</p>
              <h1 class="h3 mb-1 text-gray-800">Keuangan harian, buku kembalian, dan saldo pembeli</h1>
              <p class="small text-gray-600 mb-0">Catat uang masuk harian, cocokkan total kembalian dengan rincian per pembeli, lalu pantau status pengembaliannya dari satu halaman operasional.</p>
            </div>
          </div>

          <div class="row">
            <div class="col-xl-5 col-lg-6">
              <section class="card shadow mb-4" id="daily-finance-form-card">
                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                  <h6 class="m-0 font-weight-bold text-primary">Form keuangan harian</h6>
                  <div class="d-flex align-items-center gap-2">
                    <span
                      id="daily-finance-form-mode"
                      class="badge badge-light"
                      data-form-mode-create="Mode tambah"
                      data-form-mode-edit="Mode edit"
                    >
                      Mode tambah
                    </span>
                    <span class="badge badge-light">Gross - Kembalian = Net</span>
                  </div>
                </div>
                <div class="card-body">
                  <form id="daily-finance-form">
                    <input type="hidden" name="id">

                    <div class="form-group">
                      <label for="financeDate">Tanggal</label>
                      <input id="financeDate" name="financeDate" type="date" class="form-control" required>
                    </div>

                    <div class="form-row">
                      <div class="form-group col-sm-6">
                        <label for="grossAmount">Total uang masuk</label>
                        <input id="grossAmount" name="grossAmount" type="number" min="0" step="500" class="form-control" required>
                      </div>
                      <div class="form-group col-sm-6">
                        <label for="changeTotal">Total uang kembalian</label>
                        <input id="changeTotal" name="changeTotal" type="number" min="0" step="500" class="form-control" required>
                      </div>
                    </div>

                    <div class="form-group">
                      <label for="netAmount">Pendapatan bersih</label>
                      <input id="netAmount" name="netAmount" type="number" class="form-control" readonly>
                      <small id="finance-balance-note" class="form-text text-muted">Masukkan gross dan total kembalian untuk melihat hasil perhitungan.</small>
                    </div>

                    <div class="form-group">
                      <div class="d-flex align-items-center justify-content-between mb-2">
                        <label class="mb-0">Rincian kembalian</label>
                        <button type="button" id="add-change-entry" class="btn btn-sm btn-outline-primary">
                          <i class="fas fa-plus fa-sm mr-1"></i>Tambah baris
                        </button>
                      </div>
                      <div id="change-entry-editor"></div>
                    </div>

                    <div class="form-group">
                      <label for="financeNotes">Catatan</label>
                      <textarea id="financeNotes" name="notes" rows="3" class="form-control" placeholder="Contoh: kembalian masih menunggu jam pulang."></textarea>
                    </div>

                    <div class="pos-form-actions">
                      <button
                        type="submit"
                        id="daily-finance-submit"
                        class="btn btn-primary shadow-sm"
                        data-form-mode-create="Simpan keuangan harian"
                        data-form-mode-edit="Perbarui keuangan harian"
                      >
                        Simpan keuangan harian
                      </button>
                      <button
                        type="button"
                        id="daily-finance-reset"
                        class="btn btn-outline-secondary"
                        data-form-mode-create="Reset"
                        data-form-mode-edit="Batal edit"
                      >
                        Reset
                      </button>
                    </div>
                  </form>
                </div>
              </section>
            </div>

            <div class="col-xl-7 col-lg-6">
              <section class="card shadow mb-4">
                <div class="card-header py-3 pos-card-toolbar">
                  <h6 class="m-0 font-weight-bold text-primary">Riwayat keuangan harian</h6>
                  <div class="form-inline">
                    <div class="form-group">
                      <label class="sr-only" for="finance-filter-date">Filter tanggal</label>
                      <input id="finance-filter-date" type="date" class="form-control" placeholder="Tanggal">
                    </div>
                    <div class="form-group">
                      <label class="sr-only" for="finance-filter-search">Cari catatan</label>
                      <input id="finance-filter-search" type="text" class="form-control" placeholder="Cari catatan / petugas">
                    </div>
                    <button type="button" id="finance-filter-reset" class="btn btn-outline-secondary btn-sm">Reset filter</button>
                  </div>
                </div>
                <div class="card-body" id="daily-finance-table"></div>
              </section>
            </div>
          </div>

          <section class="card shadow mb-4">
            <div class="card-header py-3 pos-card-toolbar">
              <h6 class="m-0 font-weight-bold text-primary">Buku kembalian pembeli</h6>
              <div class="form-inline">
                <div class="form-group">
                  <label class="sr-only" for="change-filter-status">Status</label>
                  <select id="change-filter-status" class="custom-select">
                    <option value="">Semua status</option>
                    <option value="belum">Belum</option>
                    <option value="selesai">Selesai</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="sr-only" for="change-filter-date">Tanggal</label>
                  <input id="change-filter-date" type="date" class="form-control">
                </div>
                <div class="form-group">
                  <label class="sr-only" for="change-filter-search">Cari pembeli</label>
                  <input id="change-filter-search" type="text" class="form-control" placeholder="Cari pembeli / catatan">
                </div>
                <button type="button" id="change-filter-reset" class="btn btn-outline-secondary btn-sm">Reset filter</button>
              </div>
            </div>
            <div class="card-body" id="change-book-table"></div>
          </section>

          <section class="card shadow mb-4">
            <div class="card-header py-3 pos-card-toolbar">
              <h6 class="m-0 font-weight-bold text-primary">Saldo pembeli</h6>
              <div class="form-inline">
                <div class="form-group">
                  <label class="sr-only" for="buyer-filter-status">Status</label>
                  <select id="buyer-filter-status" class="custom-select">
                    <option value="">Semua status</option>
                    <option value="aktif">Aktif</option>
                    <option value="nonaktif">Nonaktif</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="sr-only" for="buyer-filter-search">Cari pembeli</label>
                  <input id="buyer-filter-search" type="text" class="form-control" placeholder="Cari nama / kelas">
                </div>
                <button type="button" id="buyer-filter-reset" class="btn btn-outline-secondary btn-sm">Reset filter</button>
              </div>
            </div>
            <div class="card-body" id="buyers-balance-table"></div>
          </section>
        </div>

        <footer class="sticky-footer bg-white">
          <div class="container my-auto">
            <div class="copyright text-center my-auto pos-footer-note">
              <span>Keuangan harian tervalidasi dari total gross, rincian kembalian, dan master pembeli aktif hasil import.</span>
            </div>
          </div>
        </footer>
      </section>
    </template>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
