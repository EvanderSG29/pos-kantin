<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Users | POS Kantin</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <link href="./assets/vendor/sb-admin-2/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
    <link href="./assets/vendor/sb-admin-2/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="./assets/css/sb-admin-custom.css" rel="stylesheet">
  </head>
  <body class="pos-shell-page">
    <div id="app-shell">
      <aside id="app-sidebar"></aside>

      <div class="pos-shell-body">
        <header id="app-topbar"></header>

        <main id="app-main" class="pos-main" aria-live="polite" aria-busy="false">
          <div id="app-page-slot"></div>
          <div id="app-main-loading" class="pos-main-loading" hidden>
            <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
            <p id="app-main-loading-text" class="mb-0">Memuat konten...</p>
          </div>
        </main>
      </div>
    </div>

    <button id="scroll-to-top" class="scroll-to-top rounded" type="button" hidden aria-label="Kembali ke atas">
      <i class="fas fa-angle-up"></i>
    </button>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <template id="page-template" data-page-key="users" data-page-title="Users">
      <section class="pos-page-view">
        <div class="container-fluid">
          <div class="pos-page-header">
            <div>
              <p class="pos-section-title">Users</p>
              <h1 class="h3 mb-1 text-gray-800">Kelola petugas</h1>
              <p class="small text-gray-600 mb-0">Tambah admin atau petugas, ubah status aktif, dan reset PIN lewat satu panel formulir.</p>
            </div>
          </div>

          <div class="row">
            <div class="col-xl-4 col-lg-5">
              <section class="card shadow mb-4">
                <div class="card-header py-3">
                  <h6 class="m-0 font-weight-bold text-primary">Form user</h6>
                </div>
                <div class="card-body">
                  <form id="user-form">
                    <input type="hidden" name="id">

                    <div class="form-group">
                      <label for="fullName">Nama lengkap</label>
                      <input id="fullName" name="fullName" type="text" class="form-control" required>
                    </div>

                    <div class="form-row">
                      <div class="form-group col-sm-6">
                        <label for="nickname">Nama panggilan</label>
                        <input id="nickname" name="nickname" type="text" class="form-control" required>
                      </div>
                      <div class="form-group col-sm-6">
                        <label for="classGroup">Rombel</label>
                        <input id="classGroup" name="classGroup" type="text" class="form-control" placeholder="XI PPLG">
                      </div>
                    </div>

                    <div class="form-group">
                      <label for="email">Email</label>
                      <input id="email" name="email" type="email" class="form-control" required>
                    </div>

                    <div class="form-row">
                      <div class="form-group col-sm-6">
                        <label for="role">Role</label>
                        <select id="role" name="role" class="custom-select">
                          <option value="petugas">Petugas</option>
                          <option value="admin">Admin</option>
                        </select>
                      </div>
                      <div class="form-group col-sm-6">
                        <label for="status">Status</label>
                        <select id="status" name="status" class="custom-select">
                          <option value="aktif">Aktif</option>
                          <option value="nonaktif">Nonaktif</option>
                        </select>
                      </div>
                    </div>

                    <div class="form-group">
                      <label for="pin">PIN baru</label>
                      <input id="pin" name="pin" type="password" inputmode="numeric" class="form-control" placeholder="Kosongkan jika tidak diubah">
                    </div>

                    <div class="form-group">
                      <label for="notes">Catatan</label>
                      <textarea id="notes" name="notes" rows="4" class="form-control"></textarea>
                    </div>

                    <div class="pos-form-actions">
                      <button type="submit" class="btn btn-primary shadow-sm">Simpan user</button>
                      <button type="button" id="user-reset" class="btn btn-outline-secondary">Reset</button>
                    </div>
                  </form>
                </div>
              </section>
            </div>

            <div class="col-xl-8 col-lg-7">
              <section class="card shadow mb-4">
                <div class="card-header py-3">
                  <h6 class="m-0 font-weight-bold text-primary">Daftar user</h6>
                </div>
                <div class="card-body" id="users-table"></div>
              </section>
            </div>
          </div>
        </div>

        <footer class="sticky-footer bg-white">
          <div class="container my-auto">
            <div class="copyright text-center my-auto pos-footer-note">
              <span>Kelola data user admin dan petugas sesuai role dan status aktifnya.</span>
            </div>
          </div>
        </footer>
      </section>
    </template>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
