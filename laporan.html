<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Laporan | POS Kantin</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <link href="./assets/vendor/sb-admin-2/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
    <link href="./assets/vendor/sb-admin-2/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="./assets/css/sb-admin-custom.css" rel="stylesheet">
  </head>
  <body class="pos-shell-page">
    <div id="app-shell">
      <aside id="app-sidebar"></aside>

      <div class="pos-shell-body">
        <header id="app-topbar"></header>

        <main id="app-main" class="pos-main" aria-live="polite" aria-busy="false">
          <div id="app-page-slot"></div>
          <div id="app-main-loading" class="pos-main-loading" hidden>
            <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
            <p id="app-main-loading-text" class="mb-0">Memuat konten...</p>
          </div>
        </main>
      </div>
    </div>

    <button id="scroll-to-top" class="scroll-to-top rounded" type="button" hidden aria-label="Kembali ke atas">
      <i class="fas fa-angle-up"></i>
    </button>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <template id="page-template" data-page-key="reports" data-page-title="Laporan">
      <section class="pos-page-view">
        <div class="container-fluid">
          <div class="pos-page-header">
            <div>
              <p class="pos-section-title">Laporan</p>
              <h1 class="h3 mb-1 text-gray-800">Filter dan rekap transaksi</h1>
              <p class="small text-gray-600 mb-0">Gunakan rentang tanggal, pemasok, dan skema komisi untuk menyusun ringkasan omzet, laba, hak kantin, dan utang pemasok.</p>
            </div>
          </div>

          <section class="card shadow mb-4">
            <div class="card-header py-3">
              <h6 class="m-0 font-weight-bold text-primary">Filter laporan</h6>
            </div>
            <div class="card-body">
              <div class="form-row pos-report-filters">
                <div class="form-group col-lg-3 col-md-4">
                  <label for="report-start">Tanggal awal</label>
                  <input id="report-start" type="date" class="form-control">
                </div>
                <div class="form-group col-lg-3 col-md-4">
                  <label for="report-end">Tanggal akhir</label>
                  <input id="report-end" type="date" class="form-control">
                </div>
                <div class="form-group col-lg-3 col-md-4">
                  <label for="report-supplier">Pemasok</label>
                  <select id="report-supplier" class="custom-select">
                    <option value="">Semua pemasok</option>
                  </select>
                </div>
                <div class="form-group col-lg-3 col-md-4">
                  <label for="report-commission-type">Skema komisi</label>
                  <select id="report-commission-type" class="custom-select">
                    <option value="">Semua skema</option>
                    <option value="revenue">Bagi Omzet</option>
                    <option value="profit">Bagi Hasil</option>
                  </select>
                </div>
                <div class="form-group col-lg-12 col-md-8">
                  <label for="report-search">Cari kata kunci</label>
                  <input id="report-search" type="text" class="form-control" placeholder="Pemasok, makanan, petugas, catatan">
                </div>
              </div>
            </div>
          </section>

          <section id="report-summary" class="pos-summary-grid"></section>

          <section class="card shadow mb-4">
            <div class="card-header py-3">
              <h6 class="m-0 font-weight-bold text-primary">Hasil laporan</h6>
            </div>
            <div class="card-body" id="report-table"></div>
          </section>
        </div>

        <footer class="sticky-footer bg-white">
          <div class="container my-auto">
            <div class="copyright text-center my-auto pos-footer-note">
              <span>Laporan transaksi menyajikan omzet, laba, hak kantin, dan nominal payout pemasok tanpa mengubah data sumber.</span>
            </div>
          </div>
        </footer>
      </section>
    </template>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
