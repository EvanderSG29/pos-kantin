<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Laporan | POS Kantin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/dashboard.css">
    <link rel="stylesheet" href="./assets/css/table.css">
    <link rel="stylesheet" href="./assets/css/components.css">
  </head>
  <body class="app-page">
    <div class="shell">
      <aside id="sidebar" class="shell__sidebar"></aside>
      <div class="shell__body">
        <header id="topbar" class="shell__topbar"></header>
        <main class="page stack">
          <section class="page-header">
            <div>
              <p class="eyebrow">Laporan</p>
              <h1>Filter dan rekap transaksi</h1>
            </div>
          </section>

          <section class="panel stack">
            <div class="form-grid">
              <div class="form-field">
                <label for="report-start">Tanggal awal</label>
                <input id="report-start" type="date">
              </div>
              <div class="form-field">
                <label for="report-end">Tanggal akhir</label>
                <input id="report-end" type="date">
              </div>
              <div class="form-field">
                <label for="report-search">Cari kata kunci</label>
                <input id="report-search" type="text" placeholder="pemasok / makanan / petugas">
              </div>
            </div>
            <div id="report-summary" class="card-grid"></div>
            <div id="report-table"></div>
          </section>
        </main>
      </div>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root"></div>
    <script type="module" src="./assets/js/pages/laporan.js"></script>
  </body>
</html>
